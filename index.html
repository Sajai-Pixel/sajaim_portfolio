<!doctype html>
<html lang="en">

<head>
  <!-- Basic Meta -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Title (CRITICAL for SEO) -->
  <title>Sajai M | Frontend & React Developer Portfolio</title>

  <!-- Meta Description (CRITICAL for search results) -->
  <meta name="description"
    content="Sajai M is a Frontend & React Developer specializing in HTML, CSS, JavaScript, React, and UI design. View projects, skills, and experience." />

  <!-- Keywords (Low impact, but harmless) -->
  <meta name="keywords"
    content="Sajai M, React Developer, Frontend Developer, Web Developer, HTML CSS JavaScript, Portfolio" />
  
  <!-- Robots -->
  <meta name="robots" content="index, follow" />
  <!-- Author -->
  <meta name="author" content="Sajai M" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/react.svg" />
  <link rel="apple-touch-icon" href="/react.svg" />


  <!-- Canonical URL (VERY IMPORTANT) -->
  <link rel="canonical" href="https://sajaim-portfolio.vercel.app/" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- Open Graph (Social Sharing SEO) -->
  <meta property="og:site_name" content="Sajai M Portfolio" />
  <meta property="og:title" content="Sajai M | Frontend & React Developer" />
  <meta property="og:description"
    content="Frontend & React Developer portfolio showcasing projects, skills, and experience." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://sajaim-portfolio.vercel.app/" />
  <meta property="og:image" content="https://sajaim-portfolio.vercel.app/og-preview.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Sajai M | Frontend & React Developer" />
  <meta name="twitter:description" content="Explore projects and skills of Sajai M, Frontend & React Developer." />
  <meta name="twitter:image" content="https://sajaim-portfolio.vercel.app/og-preview.png" />
</head>


<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
